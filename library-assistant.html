<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>University Library Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:       #0f1f38;
      --navy-light: #162b4d;
      --navy-mid:   #1e3a5f;
      --gold:       #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim:   #c9a84c22;
      --cream:      #f5f0e8;
      --cream-dim:  #f5f0e815;
      --text:       #e8e2d6;
      --text-muted: #8a9ab5;
      --border:     #1e3a5f;
      --green:      #4caf82;
      --red:        #e05c5c;
    }

    html, body {
      height: 100%;
      background: var(--navy);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
    }

    /* ── background texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, #1e3a5f55 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 90%, #c9a84c0d 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── layout ── */
    .shell {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-rows: auto 1fr auto;
      height: 100vh;
      max-width: 820px;
      margin: 0 auto;
      padding: 0 24px;
    }

    /* ── header ── */
    header {
      padding: 28px 0 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: flex-end;
      gap: 20px;
    }

    .logo-mark {
      width: 44px;
      height: 44px;
      border: 1.5px solid var(--gold);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .logo-mark::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--gold-dim), transparent);
    }

    .logo-mark svg {
      position: relative;
      z-index: 1;
    }

    .header-text h1 {
      font-family: 'Playfair Display', serif;
      font-size: 20px;
      font-weight: 600;
      color: var(--cream);
      letter-spacing: 0.01em;
      line-height: 1.2;
    }

    .header-text p {
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-top: 3px;
    }

    .status-pill {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* ── chat area ── */
    .chat {
      overflow-y: auto;
      padding: 32px 0;
      display: flex;
      flex-direction: column;
      gap: 28px;
      scrollbar-width: thin;
      scrollbar-color: var(--navy-mid) transparent;
    }

    .chat::-webkit-scrollbar { width: 4px; }
    .chat::-webkit-scrollbar-track { background: transparent; }
    .chat::-webkit-scrollbar-thumb { background: var(--navy-mid); border-radius: 4px; }

    /* ── welcome state ── */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      text-align: center;
      padding: 40px 0;
      gap: 16px;
      animation: fadeUp 0.6s ease both;
    }

    .welcome-icon {
      width: 64px;
      height: 64px;
      border: 1px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--gold-dim);
      margin-bottom: 8px;
    }

    .welcome h2 {
      font-family: 'Playfair Display', serif;
      font-size: 26px;
      color: var(--cream);
      font-weight: 400;
    }

    .welcome p {
      font-size: 14px;
      color: var(--text-muted);
      max-width: 380px;
      line-height: 1.7;
    }

    .suggestion-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }

    .chip {
      font-size: 12px;
      padding: 7px 14px;
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
    }

    .chip:hover {
      border-color: var(--gold);
      color: var(--gold-light);
      background: var(--gold-dim);
    }

    /* ── messages ── */
    .message {
      display: flex;
      gap: 14px;
      animation: fadeUp 0.3s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 13px;
      font-weight: 500;
      margin-top: 2px;
    }

    .avatar.user {
      background: var(--navy-mid);
      border: 1px solid var(--border);
      color: var(--gold);
    }

    .avatar.assistant {
      background: var(--gold-dim);
      border: 1px solid var(--gold);
      color: var(--gold);
    }

    .bubble {
      flex: 1;
      max-width: calc(100% - 46px);
    }

    .bubble-label {
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 7px;
      font-weight: 500;
    }

    .bubble-text {
      font-size: 14.5px;
      line-height: 1.75;
      color: var(--text);
    }

    .message.user .bubble-text {
      color: var(--cream);
      font-weight: 400;
    }

    /* ── sources ── */
    .sources {
      margin-top: 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sources-label {
      font-size: 11px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .source-card {
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      transition: border-color 0.2s;
    }

    .source-card:hover { border-color: var(--gold); }

    .source-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--cream);
      line-height: 1.4;
    }

    .source-author {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .source-badge {
      font-size: 11px;
      padding: 3px 9px;
      border-radius: 12px;
      white-space: nowrap;
      font-weight: 500;
      flex-shrink: 0;
    }

    .source-badge.available {
      background: #4caf8222;
      color: var(--green);
      border: 1px solid #4caf8244;
    }

    .source-badge.unavailable {
      background: #e05c5c18;
      color: var(--red);
      border: 1px solid #e05c5c33;
    }

    /* ── typing indicator ── */
    .typing {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 4px 0;
    }

    .typing span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--gold);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing span:nth-child(2) { animation-delay: 0.15s; }
    .typing span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40%           { transform: translateY(-5px); opacity: 1; }
    }

    /* ── cursor blink ── */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 1em;
      background: var(--gold);
      margin-left: 2px;
      vertical-align: text-bottom;
      animation: blink 0.9s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0; }
    }

    /* ── input area ── */
    .input-area {
      padding: 20px 0 28px;
      border-top: 1px solid var(--border);
    }

    .auth-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .token-input {
      flex: 1;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 9px 14px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      color: var(--text-muted);
      outline: none;
      transition: border-color 0.2s;
    }

    .token-input::placeholder { color: #4a5a75; }
    .token-input:focus { border-color: var(--gold); color: var(--text); }

    .auth-btn {
      padding: 9px 16px;
      background: var(--navy-mid);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-muted);
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .auth-btn:hover { border-color: var(--gold); color: var(--gold-light); }
    .auth-btn.authed { border-color: var(--green); color: var(--green); }

    .compose {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    .compose-input {
      flex: 1;
      background: var(--navy-light);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 13px 18px;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 300;
      color: var(--text);
      outline: none;
      resize: none;
      min-height: 50px;
      max-height: 140px;
      line-height: 1.5;
      transition: border-color 0.2s;
    }

    .compose-input::placeholder { color: #4a5a75; }
    .compose-input:focus { border-color: var(--gold); }

    .send-btn {
      width: 48px;
      height: 48px;
      background: var(--gold);
      border: none;
      border-radius: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .send-btn:hover { background: var(--gold-light); transform: scale(1.04); }
    .send-btn:disabled { background: var(--navy-mid); cursor: not-allowed; transform: none; }
    .send-btn svg { color: var(--navy); }

    .hint {
      font-size: 11px;
      color: #3a4a62;
      margin-top: 10px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <header>
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
    </div>
    <div class="header-text">
      <h1>Library Assistant</h1>
      <p>University Digital Services</p>
    </div>
    <div class="status-pill">
      <span class="status-dot"></span>
      Live
    </div>
  </header>

  <!-- Chat -->
  <div class="chat" id="chat">
    <div class="welcome" id="welcome">
      <div class="welcome-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="1.5">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
        </svg>
      </div>
      <h2>What are you looking for?</h2>
      <p>Ask me anything about our book catalog — I'll find what's available and relevant to your needs.</p>
      <div class="suggestion-chips">
        <button class="chip" onclick="useChip(this)">Machine learning for beginners</button>
        <button class="chip" onclick="useChip(this)">Data structures and algorithms</button>
        <button class="chip" onclick="useChip(this)">Business strategy books</button>
        <button class="chip" onclick="useChip(this)">What's available right now?</button>
      </div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-area">
    <!-- Token bar -->
    <div class="auth-bar">
      <input
        class="token-input"
        id="tokenInput"
        type="password"
        placeholder="Paste your JWT token here (from POST /auth/login)"
      />
      <button class="auth-btn" id="authBtn" onclick="setToken()">Authenticate</button>
    </div>

    <div class="compose">
      <textarea
        class="compose-input"
        id="queryInput"
        placeholder="Ask about books, authors, topics…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
    <p class="hint">Enter to send · Shift+Enter for new line</p>
  </div>

</div>

<script>
  // ── Config ──────────────────────────────────────────────
  const API = window.location.origin + '/v1';
  let token = '';
  let isStreaming = false;
  const history = [];

  // ── Auth ─────────────────────────────────────────────────
  function setToken() {
    const val = document.getElementById('tokenInput').value.trim();
    if (!val) return;
    token = val;
    document.getElementById('authBtn').textContent = '✓ Authenticated';
    document.getElementById('authBtn').classList.add('authed');
    document.getElementById('sendBtn').disabled = false;
  }

  // ── Chip suggestions ──────────────────────────────────────
  function useChip(el) {
    document.getElementById('queryInput').value = el.textContent;
    autoResize(document.getElementById('queryInput'));
    if (token) send();
  }

  // ── Textarea auto-resize ──────────────────────────────────
  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 140) + 'px';
  }

  // ── Key handler ───────────────────────────────────────────
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      if (!isStreaming && token) send();
    }
  }

  // ── Send ──────────────────────────────────────────────────
  async function send() {
    const input = document.getElementById('queryInput');
    const query = input.value.trim();
    if (!query || isStreaming || !token) return;

    isStreaming = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = 'auto';

    // Hide welcome screen
    const welcome = document.getElementById('welcome');
    if (welcome) welcome.remove();

    // User message
    appendMessage('user', query);
    history.push({ role: 'user', content: query });

    // Assistant placeholder
    const { bubble, textEl } = appendAssistantBubble();

    try {
      const resp = await fetch(`${API}/assistant/chat/stream`, {
        method: 'POST',
        headers: {
          'Authorization': `Bearer ${token}`,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          query,
          conversation_history: history.slice(-6),
          available_only: false
        })
      });

      if (!resp.ok) {
        textEl.textContent = 'Sorry, something went wrong. Check your token and try again.';
        finishStreaming(bubble, textEl, null);
        return;
      }

      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      let sources = [];

      // Add cursor
      const cursor = document.createElement('span');
      cursor.className = 'cursor';
      textEl.after(cursor);

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;

        const lines = decoder.decode(value).split('\n').filter(l => l.startsWith('data: '));
        for (const line of lines) {
          try {
            const event = JSON.parse(line.slice(6));
            if (event.type === 'token') {
              fullText += event.content;
              textEl.textContent = fullText;
              cursor.after(document.createTextNode(''));
              scrollChat();
            }
            if (event.type === 'sources') sources = event.books || [];
            if (event.type === 'error') {
              textEl.textContent = event.message;
            }
          } catch (_) {}
        }
      }

      cursor.remove();
      finishStreaming(bubble, textEl, sources);
      history.push({ role: 'assistant', content: fullText });

    } catch (err) {
      textEl.textContent = 'Could not reach the API. Make sure Docker Compose is running.';
      finishStreaming(bubble, textEl, null);
    }
  }

  // ── DOM helpers ───────────────────────────────────────────
  function appendMessage(role, text) {
    const chat = document.getElementById('chat');
    const msg = document.createElement('div');
    msg.className = 'message ' + role;
    msg.innerHTML = `
      <div class="avatar ${role}">${role === 'user' ? 'You' : 'AI'}</div>
      <div class="bubble">
        <div class="bubble-label">${role === 'user' ? 'You' : 'Library Assistant'}</div>
        <div class="bubble-text">${escHtml(text)}</div>
      </div>`;
    chat.appendChild(msg);
    scrollChat();
    return msg;
  }

  function appendAssistantBubble() {
    const chat = document.getElementById('chat');
    const msg = document.createElement('div');
    msg.className = 'message assistant';

    const textEl = document.createElement('span');
    textEl.className = 'bubble-text';

    const typing = document.createElement('div');
    typing.className = 'typing';
    typing.innerHTML = '<span></span><span></span><span></span>';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<div class="bubble-label">Library Assistant</div>';
    bubble.appendChild(typing);
    bubble.appendChild(textEl);

    msg.innerHTML = '<div class="avatar assistant">AI</div>';
    msg.appendChild(bubble);
    chat.appendChild(msg);
    scrollChat();
    return { bubble, textEl, typing };
  }

  function finishStreaming(bubble, textEl, sources) {
    const typing = bubble.querySelector('.typing');
    if (typing) typing.remove();

    if (sources && sources.length > 0) {
      const sourcesEl = document.createElement('div');
      sourcesEl.className = 'sources';
      sourcesEl.innerHTML = '<div class="sources-label">Sources from catalog</div>';
      sources.slice(0, 4).forEach(b => {
        const available = b.available_copies > 0;
        sourcesEl.innerHTML += `
          <div class="source-card">
            <div>
              <div class="source-title">${escHtml(b.title)}</div>
              <div class="source-author">${escHtml(b.author)}</div>
            </div>
            <span class="source-badge ${available ? 'available' : 'unavailable'}">
              ${available ? b.available_copies + ' available' : 'Unavailable'}
            </span>
          </div>`;
      });
      bubble.appendChild(sourcesEl);
    }

    isStreaming = false;
    document.getElementById('sendBtn').disabled = false;
    scrollChat();
  }

  function scrollChat() {
    const chat = document.getElementById('chat');
    chat.scrollTop = chat.scrollHeight;
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
