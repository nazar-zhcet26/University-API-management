openapi: 3.0.3
info:
  title: University Services API
  version: 1.0.0
  description: 'The central API platform for university operations.

    Covers Authentication, Students, Programs & Courses, Faculty, Library, AI
    Assistant, API Key Management, and UAE Government Reporting domains.


    ## Authentication

    Most endpoints require a Bearer JWT token obtained via `POST /auth/login`.

    Government reporting endpoints (`/gov/*`) require an `X-API-Key` header instead.


    Get a JWT token: `POST /auth/login` with your email and password.

    Use JWT: Add header `Authorization: Bearer <token>` to all requests.

    Use API Key: Add header `X-API-Key: uak_<your_key>` — service role only.


    ## Test Credentials (local / seeded environment)

    | Role | Email | Password |

    |------|-------|----------|

    | Admin | admin@university.ac.ae | Admin@1234 |

    | Student | student1@university.ac.ae | Student@1234 |

    | Faculty | faculty1@university.ac.ae | Faculty@1234 |

    | Librarian | librarian@university.ac.ae | Librarian@1234 |


    ## API-Led Connectivity Architecture

    Follows MuleSoft API-led connectivity:

    - **System Layer**: Raw data access (student records, course catalog, book inventory)

    - **Process Layer**: Business logic (enrollment validation, borrowing rules, capacity
    checks)

    - **Experience Layer**: Consumer-tailored responses (student portal, faculty dashboard)

    - **Government Layer**: UAE MOEHE reporting endpoints (Sprint 9)


    ## AI Library Assistant

    The `/assistant` endpoints use Retrieval Augmented Generation (RAG) with Azure
    OpenAI.

    Requires `AZURE_OPENAI_API_KEY` environment variable to be set.

    '
  contact:
    name: University IT - API Team
    email: api-support@university.ac.ae
  license:
    name: Internal Use Only
servers:
- url: https://api.university.ac.ae/v1
  description: Production
- url: https://api-dev.university.ac.ae/v1
  description: Development
- url: http://localhost:8000/v1
  description: Local Docker Compose
tags:
- name: Authentication
  description: Login and token refresh
- name: Students
  description: Student registration and profile management
- name: Programs
  description: Academic program management
- name: Courses
  description: Course catalog and enrollment management
- name: Faculty
  description: Faculty profile management
- name: Library - Books
  description: Book catalog management
- name: Library - Borrowings
  description: Book borrowing and return operations
- name: Library - Assistant
  description: AI-powered semantic library assistant
- name: Health
  description: Liveness, readiness probes and metrics
- name: API Keys
  description: API key management for machine-to-machine authentication
- name: UAE Government
  description: UAE MOEHE reporting endpoints — requires X-API-Key with service role
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT token obtained via OAuth2 authorization flow
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
  parameters:
    PageParam:
      name: page
      in: query
      schema:
        type: integer
        default: 1
        minimum: 1
      description: Page number for pagination
    LimitParam:
      name: limit
      in: query
      schema:
        type: integer
        default: 25
        minimum: 1
        maximum: 100
      description: Number of results per page
    SortParam:
      name: sort
      in: query
      schema:
        type: string
      description: 'Field to sort by. Prefix with - for descending. Example: sort=-created_at'
  schemas:
    # ── Sprint 9 — API Key schemas ──────────────────────────────────────────
    ApiKeyCreate:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          example: MOEHE Integration
        role:
          type: string
          enum: [service, admin, faculty, student, librarian]
          default: service
        expires_in_days:
          type: integer
          minimum: 1
          maximum: 3650
          default: 365
          description: Days until expiry. Omit for no expiry.

    ApiKeyUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        is_active:
          type: boolean
        expires_at:
          type: string
          format: date-time

    ApiKeyResponse:
      type: object
      description: Safe representation — never includes key hash.
      properties:
        id:
          type: string
        name:
          type: string
          example: MOEHE Integration
        key_prefix:
          type: string
          example: uak_3f8a2c1b
          description: First 12 chars of the key — for identification only.
        role:
          type: string
          example: service
        is_active:
          type: boolean
        expires_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ApiKeyCreateResponse:
      type: object
      description: Returned only on create and rotate. Raw key shown once — store immediately.
      properties:
        key:
          type: string
          example: uak_3f8a2c1b9e4d...
          description: Raw API key — store this securely, shown only once.
        api_key:
          $ref: '#/components/schemas/ApiKeyResponse'

    ApiKeyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/ApiKeyResponse'
        total:
          type: integer

    # ── Sprint 9 — UAE Gov schemas ──────────────────────────────────────────
    GovMeta:
      type: object
      properties:
        total:
          type: integer
        generated_at:
          type: string
          format: date-time
        institution_code:
          type: string
          example: UAE-UNI-001
        api_version:
          type: string
          example: '1.0'

    GovStudentRecord:
      type: object
      properties:
        student_id:
          type: string
        full_name_en:
          type: string
        email:
          type: string
        enrollment_status:
          type: string
          enum: [active, inactive, graduated, suspended]
        enrollment_year:
          type: integer
        program_code:
          type: string
          nullable: true
        program_name:
          type: string
          nullable: true
        department:
          type: string
          nullable: true
        academic_level:
          type: integer
          description: UAE NQF level (1-10). Bachelor=7, Master=9, PhD=10.
          example: 7
        date_of_birth:
          type: string
          format: date
          nullable: true

    GovStudentsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/GovStudentRecord'
        meta:
          $ref: '#/components/schemas/GovMeta'

    GovStatsResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            total_students:
              type: integer
            total_active_enrollments:
              type: integer
            by_status:
              type: object
              properties:
                active:
                  type: integer
                inactive:
                  type: integer
                graduated:
                  type: integer
                suspended:
                  type: integer
            by_program:
              type: array
              items:
                type: object
                properties:
                  program_code:
                    type: string
                  program_name:
                    type: string
                  department:
                    type: string
                  student_count:
                    type: integer
            by_enrollment_year:
              type: object
              additionalProperties:
                type: integer
        meta:
          $ref: '#/components/schemas/GovMeta'

    GovProgramRecord:
      type: object
      properties:
        program_id:
          type: string
        program_code:
          type: string
        program_name:
          type: string
        department:
          type: string
        duration_years:
          type: integer
        description:
          type: string
          nullable: true
        nqf_level:
          type: integer
          description: UAE National Qualifications Framework level (1-10)
          example: 7
        total_students:
          type: integer

    GovProgramsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/GovProgramRecord'
        meta:
          $ref: '#/components/schemas/GovMeta'

    PaginationMeta:
      type: object
      properties:
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 25
        total_items:
          type: integer
          example: 142
        total_pages:
          type: integer
          example: 6
    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              example: VALIDATION_ERROR
            message:
              type: string
              example: The request body contains invalid fields
            details:
              type: array
              items:
                type: object
                properties:
                  field:
                    type: string
                  issue:
                    type: string
              example:
              - field: email
                issue: Must be a valid university email address
    StudentBase:
      type: object
      required:
      - first_name
      - last_name
      - email
      - date_of_birth
      - program_id
      - enrollment_year
      properties:
        first_name:
          type: string
          example: Nazar
        last_name:
          type: string
          example: Kamaal
        email:
          type: string
          format: email
          example: nazar.kamaal@university.ac.ae
        date_of_birth:
          type: string
          format: date
          example: '1997-05-15'
        program_id:
          type: string
          description: Reference to the Programs domain — not embedded, fetched separately
          example: prog_cs_101
        enrollment_year:
          type: integer
          example: 2026
        status:
          type: string
          enum:
          - active
          - inactive
          - graduated
          - suspended
          default: active
    Student:
      allOf:
      - $ref: '#/components/schemas/StudentBase'
      - type: object
        properties:
          id:
            type: string
            example: stu_10042
            readOnly: true
          created_at:
            type: string
            format: date-time
            readOnly: true
          updated_at:
            type: string
            format: date-time
            readOnly: true
    StudentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Student'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    ProgramBase:
      type: object
      required:
      - code
      - name
      - department
      - duration_years
      properties:
        code:
          type: string
          example: CS-BSC
        name:
          type: string
          example: Bachelor of Science in Computer Science
        department:
          type: string
          example: computer_science
        duration_years:
          type: integer
          example: 4
        description:
          type: string
          example: A four-year program covering software engineering, AI, and systems
            design.
    Program:
      allOf:
      - $ref: '#/components/schemas/ProgramBase'
      - type: object
        properties:
          id:
            type: string
            example: prog_cs_101
            readOnly: true
          created_at:
            type: string
            format: date-time
            readOnly: true
          updated_at:
            type: string
            format: date-time
            readOnly: true
    ProgramListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Program'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    CourseBase:
      type: object
      required:
      - code
      - title
      - program_id
      - credits
      - semester
      - faculty_id
      - max_capacity
      properties:
        code:
          type: string
          example: CS301
        title:
          type: string
          example: Machine Learning Fundamentals
        description:
          type: string
          example: Introduction to supervised and unsupervised learning techniques
        program_id:
          type: string
          example: prog_cs_101
        credits:
          type: integer
          example: 3
        semester:
          type: string
          example: fall_2026
        faculty_id:
          type: string
          description: Reference to the Faculty domain
          example: fac_2001
        max_capacity:
          type: integer
          example: 40
    Course:
      allOf:
      - $ref: '#/components/schemas/CourseBase'
      - type: object
        properties:
          id:
            type: string
            example: crs_5010
            readOnly: true
          current_enrollment:
            type: integer
            description: Server-computed derived field. Read-only — never sent by
              the client.
            readOnly: true
            example: 27
          created_at:
            type: string
            format: date-time
            readOnly: true
          updated_at:
            type: string
            format: date-time
            readOnly: true
    CourseListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Course'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    EnrollmentRequest:
      type: object
      required:
      - student_id
      properties:
        student_id:
          type: string
          example: stu_10042
    Enrollment:
      type: object
      properties:
        id:
          type: string
          example: enr_80001
          readOnly: true
        course_id:
          type: string
          example: crs_5010
        student_id:
          type: string
          example: stu_10042
        enrolled_at:
          type: string
          format: date-time
          readOnly: true
        status:
          type: string
          enum:
          - active
          - dropped
          - completed
          default: active
    EnrollmentListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Enrollment'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    FacultyBase:
      type: object
      required:
      - first_name
      - last_name
      - email
      - department
      - title
      properties:
        first_name:
          type: string
          example: Sarah
        last_name:
          type: string
          example: Ahmed
        email:
          type: string
          format: email
          example: s.ahmed@university.ac.ae
        department:
          type: string
          example: computer_science
        title:
          type: string
          enum:
          - Lecturer
          - Assistant Professor
          - Associate Professor
          - Professor
          example: Associate Professor
        specializations:
          type: array
          items:
            type: string
          example:
          - machine_learning
          - natural_language_processing
        office_number:
          type: string
          example: B-204
    Faculty:
      allOf:
      - $ref: '#/components/schemas/FacultyBase'
      - type: object
        properties:
          id:
            type: string
            example: fac_2015
            readOnly: true
          created_at:
            type: string
            format: date-time
            readOnly: true
          updated_at:
            type: string
            format: date-time
            readOnly: true
    FacultyListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Faculty'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    BookBase:
      type: object
      required:
      - title
      - author
      - isbn
      - genre
      - total_copies
      properties:
        title:
          type: string
          example: Introduction to Algorithms
        author:
          type: string
          example: Thomas Cormen
        isbn:
          type: string
          example: '9780262033848'
        genre:
          type: string
          example: computer_science
        total_copies:
          type: integer
          example: 5
        publisher:
          type: string
          example: MIT Press
        published_year:
          type: integer
          example: 2009
    Book:
      allOf:
      - $ref: '#/components/schemas/BookBase'
      - type: object
        properties:
          id:
            type: string
            example: book_301
            readOnly: true
          available_copies:
            type: integer
            description: Server-computed. Read-only — calculated from total_copies
              minus active borrowings.
            readOnly: true
            example: 3
          created_at:
            type: string
            format: date-time
            readOnly: true
          updated_at:
            type: string
            format: date-time
            readOnly: true
    BookListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Book'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    BorrowingRequest:
      type: object
      required:
      - book_id
      - student_id
      - due_date
      properties:
        book_id:
          type: string
          example: book_301
        student_id:
          type: string
          example: stu_10042
        due_date:
          type: string
          format: date
          example: '2026-03-25'
    BorrowingUpdate:
      type: object
      properties:
        status:
          type: string
          enum:
          - returned
          - lost
          description: 'Updating status to ''returned'' automatically sets returned_at
            to current timestamp.

            The client never sends returned_at directly — it is server-managed.

            '
    Borrowing:
      type: object
      properties:
        id:
          type: string
          example: brw_60001
          readOnly: true
        book_id:
          type: string
          example: book_301
        student_id:
          type: string
          example: stu_10042
        borrowed_at:
          type: string
          format: date-time
          readOnly: true
        due_date:
          type: string
          format: date
          example: '2026-03-25'
        returned_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Set automatically by server when status changes to 'returned'
        status:
          type: string
          enum:
          - active
          - returned
          - overdue
          - lost
          example: active
    BorrowingListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Borrowing'
        pagination:
          $ref: '#/components/schemas/PaginationMeta'
    ChatMessage:
      type: object
      required:
      - role
      - content
      properties:
        role:
          type: string
          enum:
          - user
          - assistant
        content:
          type: string
          minLength: 1
          maxLength: 2000
    ChatRequest:
      type: object
      required:
      - query
      properties:
        query:
          type: string
          minLength: 3
          maxLength: 500
          example: I need a machine learning book for beginners
        conversation_history:
          type: array
          items:
            $ref: '#/components/schemas/ChatMessage'
          default: []
        available_only:
          type: boolean
          default: false
          description: Only recommend books with available copies
    ChatResponse:
      type: object
      properties:
        answer:
          type: string
          description: AI-generated response grounded in the library catalog
        sources:
          type: array
          items:
            type: object
          description: Books retrieved and used as context
        query:
          type: string
        request_id:
          type: string
    SemanticSearchResponse:
      type: object
      properties:
        results:
          type: array
          items:
            type: object
        query:
          type: string
        total:
          type: integer
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - alive
          - ready
          - not_ready
          - healthy
        version:
          type: string
        environment:
          type: string
        uptime_seconds:
          type: integer
        checks:
          type: object
    LoginRequest:
      type: object
      required:
      - email
      - password
      properties:
        email:
          type: string
          format: email
          example: student1@university.ac.ae
        password:
          type: string
          example: Student@1234
    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: bearer
        expires_in:
          type: integer
          example: 3600
    RefreshRequest:
      type: object
      required:
      - refresh_token
      properties:
        refresh_token:
          type: string
  responses:
    BadRequest:
      description: Invalid request body or parameters
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Authenticated but insufficient permissions for this action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict with current resource state (e.g. duplicate email, already
        enrolled)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Semantically invalid — passes validation but violates a business
        rule (e.g. course at capacity)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
security:
- BearerAuth: []
paths:
  /auth/login:
    post:
      tags:
      - Authentication
      summary: Login and get JWT tokens
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'
  /auth/refresh:
    post:
      tags:
      - Authentication
      summary: Refresh access token
      operationId: refreshToken
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: New access token issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /health/live:
    get:
      tags:
      - Health
      summary: Liveness probe
      description: Is the process running? Used by Azure Container Apps to decide
        whether to restart.
      operationId: livenessCheck
      security: []
      responses:
        '200':
          description: Process is alive
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/ready:
    get:
      tags:
      - Health
      summary: Readiness probe
      description: Are all dependencies healthy? Returns 503 if database or Redis
        is unreachable.
      operationId: readinessCheck
      security: []
      responses:
        '200':
          description: All dependencies healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
        '503':
          description: One or more dependencies unhealthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health:
    get:
      tags:
      - Health
      summary: Simple health check
      description: Used by Azure APIM backend health probe.
      operationId: healthCheck
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /students:
    get:
      tags:
      - Students
      summary: List all students
      description: Returns a paginated list of students. Supports filtering by program,
        year, and status.
      parameters:
      - $ref: '#/components/parameters/PageParam'
      - $ref: '#/components/parameters/LimitParam'
      - $ref: '#/components/parameters/SortParam'
      - name: program
        in: query
        schema:
          type: string
        example: computer_science
      - name: year
        in: query
        schema:
          type: integer
        example: 2026
      - name: status
        in: query
        schema:
          type: string
          enum:
          - active
          - inactive
          - graduated
          - suspended
      responses:
        '200':
          description: Paginated list of students
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StudentListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/TooManyRequests'
      operationId: listStudents
    post:
      tags:
      - Students
      summary: Register a new student
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/StudentBase'
      responses:
        '201':
          description: Student registered successfully
          headers:
