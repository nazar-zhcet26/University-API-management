              schema:
                $ref: '#/components/schemas/ChatResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '503':
          description: AI service temporarily unavailable
  /assistant/chat/stream:
    post:
      tags:
      - Library - Assistant
      summary: Ask the library assistant (streaming)
      description: Same as /assistant/chat but streams tokens as Server-Sent Events.
        Use for real-time typing effect in UI.
      operationId: chatWithAssistantStream
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatRequest'
      responses:
        '200':
          description: SSE stream of tokens
          content:
            text/event-stream:
              schema:
                type: string
              example: 'data: {"type": "token", "content": "Based on our catalog..."}


                data: {"type": "done"}'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /assistant/search:
    get:
      tags:
      - Library - Assistant
      summary: Semantic book search
      description: Search books by semantic similarity — finds conceptually related
        books even without exact keyword matches.
      operationId: semanticBookSearch
      parameters:
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 2
        example: machine learning algorithms
      - name: limit
        in: query
        schema:
          type: integer
          default: 5
          minimum: 1
          maximum: 20
      - name: available_only
        in: query
        schema:
          type: boolean
          default: false
      - name: min_similarity
        in: query
        schema:
          type: number
          default: 0.65
          minimum: 0.0
          maximum: 1.0
      responses:
        '200':
          description: Ranked semantic search results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SemanticSearchResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /assistant/books/{book_id}/index:
    post:
      tags:
      - Library - Assistant
      summary: Re-index a book embedding
      description: Regenerate the semantic embedding for a book. Call after updating
        a book description. Librarian or admin only.
      operationId: indexBook
      parameters:
      - name: book_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '202':
          description: Indexing accepted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── API KEYS ────────────────────────────────────────────────────────────────
  /api-keys:
    post:
      tags:
      - API Keys
      summary: Create API key
      description: Generates a new API key. The raw key is returned exactly once — store it securely. Admin only.
      operationId: createApiKey
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyCreate'
            example:
              name: MOEHE Integration
              role: service
              expires_in_days: 365
      responses:
        '201':
          description: API key created. Raw key shown once — copy immediately.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    get:
      tags:
      - API Keys
      summary: List API keys
      description: Returns all API keys. Never includes key hashes — only prefix and metadata. Admin only.
      operationId: listApiKeys
      responses:
        '200':
          description: List of API keys
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyListResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api-keys/{key_id}:
    patch:
      tags:
      - API Keys
      summary: Update API key
      description: Update name, active status, or expiry. Cannot change role or regenerate hash. Admin only.
      operationId: updateApiKey
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApiKeyUpdate'
      responses:
        '200':
          description: Updated API key
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags:
      - API Keys
      summary: Revoke API key
      description: Soft-deletes by setting is_active=false. Row kept for audit trail. Admin only.
      operationId: revokeApiKey
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '204':
          description: Key revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api-keys/{key_id}/rotate:
    post:
      tags:
      - API Keys
      summary: Rotate API key
      description: Generates a new key and replaces the stored hash atomically. Old key stops working immediately. Returns new raw key once.
      operationId: rotateApiKey
      parameters:
      - name: key_id
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: New raw key — copy immediately, shown only once.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiKeyCreateResponse'
        '400':
          description: Cannot rotate a revoked key
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── UAE GOVERNMENT ──────────────────────────────────────────────────────────
  /gov/students:
    get:
      tags:
      - UAE Government
