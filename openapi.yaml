      - ApiKeyAuth: []
      responses:
        '200':
          description: Enrollment statistics
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovStatsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /gov/programs:
    get:
      tags:
      - UAE Government
      summary: UAE Gov — program catalog
      description: Program catalog with NQF levels for MOEHE reporting. Requires X-API-Key with service role.
      operationId: govPrograms
      security:
      - ApiKeyAuth: []
      responses:
        '200':
          description: Program catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GovProgramsResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'