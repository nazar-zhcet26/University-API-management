# alembic.ini
# ─────────────────────────────────────────────────────────────────────────────
# Alembic — Database Migration Tool
#
# What is Alembic?
#   Alembic is the migration tool for SQLAlchemy. It tracks changes to your
#   database schema over time — like Git, but for your database structure.
#
# Why do you need migrations?
#   You can't just change a SQLAlchemy model and expect the database to update.
#   The database has its own structure that must be changed explicitly.
#   Alembic generates Python migration scripts that ALTER the real database.
#
# The workflow:
#   1. You change a model (add a column, create a table, add an index)
#   2. Run: alembic revision --autogenerate -m "add phone to students"
#   3. Alembic compares your models to the current DB state and generates a script
#   4. Review the generated script (always review — autogenerate isn't perfect)
#   5. Run: alembic upgrade head  → applies the migration to the database
#
# In production (CI/CD):
#   Your deployment pipeline runs 'alembic upgrade head' automatically
#   before starting the new version of your app. Zero-downtime migrations.
#
# Key commands:
#   alembic upgrade head          → apply all pending migrations
#   alembic downgrade -1          → undo the last migration
#   alembic current               → show current migration version
#   alembic history               → show all migrations
#   alembic revision --autogenerate -m "description"  → create new migration
# ─────────────────────────────────────────────────────────────────────────────

[alembic]
script_location = alembic
prepend_sys_path = .

# This is overridden in alembic/env.py to read from environment variables
# Never hardcode credentials here
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/university_db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
