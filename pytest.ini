[pytest]
# pytest.ini — pytest configuration

# asyncio_mode=auto means all async test functions run automatically
# without needing @pytest.mark.asyncio on each one individually
asyncio_mode = auto

# Test discovery — where to look for tests
testpaths = tests

# Output options
addopts =
    -v
    --tb=short
    --strict-markers
    --no-header

# Custom markers — used to filter test runs
markers =
    unit: Unit tests (no external dependencies)
    integration: Integration tests (requires database)
    slow: Tests that take more than 1 second

# Minimum pytest version
minversion = 8.0
